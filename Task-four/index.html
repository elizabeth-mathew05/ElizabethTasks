<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory Game - Card UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* 3D card container */
      .memory-card {
        perspective: 900px;
        position: relative;
        overflow: visible;
        min-height: 80px;
        height: 120px;
        max-height: 160px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 1.5px 6px rgba(0,0,0,0.10);
        border-radius: 1.1rem;
        background: transparent;
      }

      /* Card container for 3D perspective */
      .memory-card {
        perspective: 800px;
        position: relative;
        overflow: visible;
        min-height: 80px;
        height: 100px;
        max-height: 140px;
      }

      /* Inner element rotates to create the left-to-right flip animation */
      .memory-card-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transform-style: preserve-3d;
        -webkit-transform-style: preserve-3d;
        z-index: 1;
        transition: transform 0.25s cubic-bezier(0.4, 0.2, 0.2, 1), box-shadow 0.2s, scale 0.2s;
        will-change: transform, box-shadow, scale;
      }

      .memory-card.turning .memory-card-inner {
        transform: rotateY(80deg) scale(1.09);
        box-shadow: 0 16px 40px rgba(0,0,0,0.25), 0 3px 12px rgba(0,0,0,0.15);
        transition: transform 0.22s cubic-bezier(0.4, 0.2, 0.2, 1), box-shadow 0.18s, scale 0.18s;
      }
      .memory-card.is-flipped .memory-card-inner {
        transform: rotateY(180deg) scale(1.01);
        box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 1.5px 6px rgba(0,0,0,0.10);
        transition: transform 0.45s cubic-bezier(0.23, 1, 0.32, 1), box-shadow 0.2s, scale 0.2s;
      }



      /* Remove duplicate .memory-card-inner block */

      /* Shared styles for both card faces */
      .memory-card-face {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        -webkit-backface-visibility: hidden;
        backface-visibility: hidden;
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(80,0,120,0.08);
        font-size: 2.2rem;
        font-weight: bold;
        border: 2.5px solid #fffbe6;
      }

      .memory-card-back {
        background: #ffd600;
        color: #222;
        z-index: 2;
        transform: rotateY(0deg);
        font-size: 2.5rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 1.5px 6px rgba(0,0,0,0.10);
        border: none;
      }

      .memory-card-front {
        background: #fffbe6;
        border: none;
        transform: rotateY(180deg);
        -webkit-transform: rotateY(180deg);
        z-index: 3;
        color: #222;
        font-size: 2.5rem;
        font-weight: bold;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 8px 24px rgba(0,0,0,0.18), 0 1.5px 6px rgba(0,0,0,0.10);
      }

      @media (max-width: 480px) {
        .game-wrapper {
          margin-top: 1rem;
          padding: 1rem;
        }

        #gameBoard {
          gap: 0.55rem;
        }
      }
    </style>
  </head>
  <body class="bg-gradient-to-br from-pink-100 to-purple-200 min-h-screen">
    <div class="game-wrapper max-w-xl mx-auto mt-10 p-6 bg-white rounded-3xl shadow-2xl">
      <div
        class="flex flex-col sm:flex-row sm:justify-between items-center mb-8 gap-2"
      >
        <h1 class="text-3xl font-extrabold text-purple-600 tracking-wide">
          Card Match Game
        </h1>
        <button
          id="restartBtn"
          class="bg-purple-500 hover:bg-purple-600 text-white px-5 py-2 rounded-xl shadow"
        >
          Restart
        </button>
      </div>
      <p id="statusText" class="text-purple-700 text-sm sm:text-base mb-4">
        Pairs found: 0/8
      </p>
      <div id="gameBoard" class="grid grid-cols-4 gap-3 sm:gap-4"></div>
    </div>
    <script>
      // --------------------------------------------
      const symbols = ["😀", "😂", "😍", "😎", "😭", "😡", "😱", "🤩"];
      let cards = [];
      let flipped = [];
      let matchedPairs = 0;
      let isChecking = false;
      const gameBoard = document.getElementById("gameBoard");
      const restartBtn = document.getElementById("restartBtn");
      const statusText = document.getElementById("statusText");
      function shuffle(array) {
        for (let i = array.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
      }
      function setupBoard() {
        cards = shuffle([...symbols, ...symbols]).map((symbol, idx) => ({
          id: idx,
          symbol,
          flipped: false,
          matched: false,
        }));
        flipped = [];
        matchedPairs = 0;
        isChecking = false;
        updateStatus();
        renderBoard();
      }
      function renderBoard() {
        gameBoard.innerHTML = "";
        cards.forEach((card) => {
          const cardDiv = document.createElement("div");
          cardDiv.className = "memory-card relative aspect-square w-full rounded-2xl shadow-lg";
          if (card.flipped || card.matched) {
            cardDiv.classList.add("is-flipped");
          }
          const innerDiv = document.createElement("div");
          innerDiv.className = "memory-card-inner";
          const backDiv = document.createElement("div");
          backDiv.className = "memory-card-face memory-card-back text-2xl sm:text-3xl text-white bg-gradient-to-br from-purple-500 to-purple-600";
          backDiv.textContent = "🂠";
          const frontDiv = document.createElement("div");
          frontDiv.className = "memory-card-face memory-card-front text-3xl sm:text-4xl bg-gradient-to-br from-purple-200 to-pink-100 border-2 border-purple-400";
          frontDiv.textContent = card.symbol;
          innerDiv.appendChild(backDiv);
          innerDiv.appendChild(frontDiv);
          cardDiv.appendChild(innerDiv);
          const clickBtn = document.createElement("button");
          clickBtn.type = "button";
          clickBtn.className = "absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10";
          clickBtn.setAttribute("aria-label", "Memory card");
          clickBtn.disabled = card.flipped || card.matched || isChecking;
          clickBtn.onclick = () => handleFlip(card.id);
          cardDiv.appendChild(clickBtn);
          gameBoard.appendChild(cardDiv);
        });
      }
      function handleFlip(id) {
        if (isChecking) return;
        const card = cards[id];
        if (card.flipped || card.matched || flipped.length === 2) return;
        const cardDivs = document.querySelectorAll('.memory-card');
        const cardDiv = cardDivs[id];
        if (cardDiv) {
          cardDiv.classList.add('turning');
          setTimeout(() => {
            cardDiv.classList.remove('turning');
            card.flipped = true;
            flipped.push(id);
            renderBoard();
            if (flipped.length === 2) {
              isChecking = true;
              setTimeout(checkMatch, 700);
            }
          }, 250);
        } else {
          card.flipped = true;
          flipped.push(id);
          renderBoard();
          if (flipped.length === 2) {
            isChecking = true;
            setTimeout(checkMatch, 700);
          }
        }
      }
      function checkMatch() {
        const [id1, id2] = flipped;
        if (cards[id1].symbol === cards[id2].symbol) {
          cards[id1].matched = true;
          cards[id2].matched = true;
          matchedPairs += 1;
        } else {
          cards[id1].flipped = false;
          cards[id2].flipped = false;
        }
        flipped = [];
        isChecking = false;
        updateStatus();
        renderBoard();
      }
      function updateStatus() {
        if (matchedPairs === symbols.length) {
          statusText.textContent = "You matched all pairs. Great job!";
          return;
        }
        statusText.textContent = `Pairs found: ${matchedPairs}/${symbols.length}`;
      }
      restartBtn.onclick = function () {
        setupBoard();
      };
      setupBoard();
    </script>
  </body>
</html>
